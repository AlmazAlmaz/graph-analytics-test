name: ci

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Run example
        run: |
          ./build/external_pagerank \
            --input examples/edges.csv \
            --output pagerank.csv \
            --iterations 100 \
            --tolerance 1e-12 \
            --threads 2

      - name: Check output
        run: |
          test -s pagerank.csv
          head -n 1 pagerank.csv | grep -q '^vertex,rank$'
          awk -F, 'NR > 1 { sum += $2; if ($2 < 0) bad = 1 } END { if (bad || sum < 0.999999 || sum > 1.000001) exit 1 }' pagerank.csv
